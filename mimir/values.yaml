mimir-distributed:
  # ── Global ────────────────────────────────────────────────────────────────
  global:
    dnsService: kube-dns

  # ── Mimir config (passed as structured YAML, rendered to mimir.yaml) ─────
  mimir:
    structuredConfig:
      multitenancy_enabled: true

      # All data on local filesystem (Longhorn PVC) — no S3 for test cluster
      common:
        storage:
          backend: filesystem

      blocks_storage:
        backend: filesystem
        filesystem:
          dir: /data/tsdb
        bucket_store:
          sync_dir: /data/tsdb-sync

      ruler_storage:
        backend: filesystem
        filesystem:
          dir: /data/ruler

      alertmanager_storage:
        backend: filesystem
        filesystem:
          dir: /data/alertmanager

      # Limits — conservative for 8 GB/worker test cluster
      limits:
        ingestion_rate: 10000
        ingestion_burst_size: 200000
        max_global_series_per_user: 500000

  # ── Component replicas — single replica each (monolithic-like) ───────────
  ingester:
    replicas: 1
    zoneAwareReplication:
      enabled: false
    persistentVolume:
      enabled: true
      size: 20Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

  distributor:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  querier:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  query_frontend:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  store_gateway:
    replicas: 1
    zoneAwareReplication:
      enabled: false
    persistentVolume:
      enabled: true
      size: 5Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  compactor:
    replicas: 1
    persistentVolume:
      enabled: true
      size: 5Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  ruler:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # ── Disable caches — not needed at test scale ────────────────────────────
  chunks-cache:
    enabled: false
  index-cache:
    enabled: false
  metadata-cache:
    enabled: false
  results-cache:
    enabled: false

  # ── Disable built-in alertmanager — we have a standalone one ────────────
  alertmanager:
    enabled: false

  # ── NGINX gateway — the single entry point for remote_write + queries ────
  nginx:
    enabled: true
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - host: mimir.caticloud.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: mimir-tls
          hosts:
            - mimir.caticloud.net
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/proxy-body-size: "32m"
