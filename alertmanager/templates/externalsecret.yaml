# Pulls AlertManager receiver credentials from Vault.
# Vault path: secret/hub/prod/alertmanager
# Required keys: SLACK_WEBHOOK_URL, SMTP_PASSWORD
#
# Create in Vault after initialization:
#   vault kv put secret/hub/prod/alertmanager \
#     SLACK_WEBHOOK_URL="https://hooks.slack.com/services/..." \
#     SMTP_PASSWORD="<smtp-app-password>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-credentials
    creationPolicy: Owner
  data:
    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: hub/prod/alertmanager
        property: SLACK_WEBHOOK_URL
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: hub/prod/alertmanager
        property: SMTP_PASSWORD
