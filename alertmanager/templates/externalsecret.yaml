# Renders the full alertmanager config into a K8s Secret with the SMTP
# password from Vault substituted by ESO's template engine.
# Vault path: secret/hub/prod/alertmanager
#
# Create/update in Vault after initialization:
#   vault kv put secret/hub/prod/alertmanager \
#     SMTP_PASSWORD="<smtp-app-password>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        alertmanager.yml: |
          global:
            resolve_timeout: 5m
            smtp_from: "dcalert@aau.iq"
            smtp_smarthost: "smtp.office365.com:587"
            smtp_auth_username: "dcalert@aau.iq"
            smtp_auth_password: "{{ .smtpPassword }}"
            smtp_require_tls: true
          route:
            group_by: ["alertname", "cluster", "namespace"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: "email-default"
            routes:
              - match:
                  severity: critical
                receiver: "email-critical"
                continue: true
              - match:
                  severity: warning
                receiver: "email-default"
          receivers:
            - name: "email-default"
              email_configs:
                - to: "dcalert@aau.iq"
                  send_resolved: true
            - name: "email-critical"
              email_configs:
                - to: "dcalert@aau.iq"
                  send_resolved: true
          inhibit_rules:
            - source_match:
                severity: critical
              target_match:
                severity: warning
              equal: ["alertname", "cluster", "namespace"]
  data:
    - secretKey: smtpPassword
      remoteRef:
        key: hub/prod/alertmanager
        property: SMTP_PASSWORD
