# Pulls AlertManager SMTP credentials from Vault.
# Vault path: secret/hub/prod/alertmanager
#
# Create in Vault after initialization:
#   vault kv put secret/hub/prod/alertmanager \
#     SMTP_PASSWORD="<smtp-app-password>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-credentials
    creationPolicy: Owner
  data:
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: hub/prod/alertmanager
        property: SMTP_PASSWORD
