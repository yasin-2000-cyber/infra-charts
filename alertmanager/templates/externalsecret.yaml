# Pulls the SMTP password from Vault into a K8s Secret.
# Vault path: secret/hub/prod/alertmanager  key: SMTP_PASSWORD
#
# To update the password in Vault:
#   vault kv put secret/hub/prod/alertmanager SMTP_PASSWORD="<new-password>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-credentials
    creationPolicy: Owner
  data:
    - secretKey: SMTP_PASSWORD
      remoteRef:
        key: hub/prod/alertmanager
        property: SMTP_PASSWORD
