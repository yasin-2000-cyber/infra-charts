alertmanager:
  # ── Persistence ───────────────────────────────────────────────────────────
  persistence:
    enabled: true
    size: 2Gi
    storageClass: longhorn

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # ── AlertManager config ───────────────────────────────────────────────────
  # Credentials (Slack webhook, SMTP) come from ExternalSecret below.
  # Reference them via env vars: ${SLACK_WEBHOOK_URL}, ${SMTP_PASSWORD}
  config:
    global:
      resolve_timeout: 5m
      # SMTP — fill in your relay details or leave for Slack-only
      smtp_from: "dcalert@aau.iq"
      smtp_smarthost: "smtp.office365.com:587"
      smtp_auth_username: "dcalert@aau.iq"
      smtp_auth_password: "${SMTP_PASSWORD}"
      smtp_require_tls: true

    route:
      group_by: ["alertname", "cluster", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "email-default"
      routes:
        - match:
            severity: critical
          receiver: "email-critical"
          continue: true
        - match:
            severity: warning
          receiver: "email-default"

    receivers:
      - name: "email-default"
        email_configs:
          - to: "dcalert@aau.iq"
            send_resolved: true

      - name: "email-critical"
        email_configs:
          - to: "dcalert@aau.iq"
            send_resolved: true

    inhibit_rules:
      # Suppress warning-level alerts when the same alert is critical
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ["alertname", "cluster", "namespace"]

  # ── Enable env var expansion in config (resolves ${SMTP_PASSWORD} → actual value) ──
  extraArgs:
    config.expand-env: "true"

  # ── Environment — credentials from ExternalSecret ────────────────────────
  # Chart uses extraEnv (discrete items), not extraEnvFrom
  extraEnv:
    - name: SMTP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: alertmanager-credentials
          key: SMTP_PASSWORD

  # ── Ingress ───────────────────────────────────────────────────────────────
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - host: alertmanager.hubtest.caticloud.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.hubtest.caticloud.net
    annotations:
      cert-manager.io/cluster-issuer: ca-issuer
