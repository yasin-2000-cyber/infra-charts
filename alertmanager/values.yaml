alertmanager:
  # ── Persistence ───────────────────────────────────────────────────────────
  persistence:
    enabled: true
    size: 2Gi
    storageClass: longhorn

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # ── AlertManager config ───────────────────────────────────────────────────
  # Config lives in the alertmanager-config Secret rendered by ExternalSecret
  # (templates/externalsecret.yaml). Disable the built-in ConfigMap so the
  # chart does not create or mount it.
  config:
    enabled: false

  # Point alertmanager at the Secret-backed config file
  extraArgs:
    config.file: /etc/alertmanager-secret/alertmanager.yml

  # Mount the alertmanager-config Secret (rendered by ExternalSecret with real password)
  extraSecretMounts:
    - name: alertmanager-config-secret
      secretName: alertmanager-config
      mountPath: /etc/alertmanager-secret/alertmanager.yml
      subPath: alertmanager.yml
      readOnly: true

  # ── Ingress ───────────────────────────────────────────────────────────────
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - host: alertmanager.hubtest.caticloud.net
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.hubtest.caticloud.net
    annotations:
      cert-manager.io/cluster-issuer: ca-issuer
