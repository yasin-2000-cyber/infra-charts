# Talos Machine Config Patch — Worker Nodes
# Apply with:
#   talosctl machineconfig patch worker.yaml \
#     --patch @talos/patches/worker-patch.yaml \
#     --output patched-worker.yaml
#
# Hardware: 8 vCPU, 8 GB RAM, 20 GB OS disk + 75 GB data disk (/dev/sdb)
# Role: All observability stack workloads run here

machine:
  kernel:
    modules:
      - name: br_netfilter
      - name: ip_vs
      - name: ip_vs_rr
      - name: ip_vs_wrr
      - name: ip_vs_sh
      - name: nf_conntrack
      - name: iscsi_tcp       # Required for Longhorn block storage
      - name: dm_crypt         # Required for Longhorn volume encryption

  sysctls:
    net.bridge.bridge-nf-call-iptables: "1"
    net.bridge.bridge-nf-call-ip6tables: "1"
    net.ipv4.ip_forward: "1"
    # MetalLB L2 mode requirements
    net.ipv4.conf.all.arp_filter: "1"
    net.ipv4.conf.all.arp_announce: "2"
    net.ipv4.conf.all.arp_ignore: "1"

  # Mount the 75 GB data disk for Longhorn
  # Adjust /dev/sdb if the disk shows up under a different device name
  disks:
    - device: /dev/sdb
      partitions:
        - mountpoint: /var/mnt/longhorn

  nodeLabels:
    node-role: worker
    longhorn-storage: "true"
