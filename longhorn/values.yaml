longhorn:
  defaultSettings:
    # Use the mounted 75 GB data disk, not the OS disk
    defaultDataPath: /var/mnt/longhorn
    # 2 replicas for HA across both workers
    defaultReplicaCount: 2
    # Retain volumes when PVC is deleted (safer)
    defaultDataLocality: disabled
    storageReservedPercentageForDefaultDisk: "10"

  persistence:
    defaultClass: true
    defaultFsType: ext4
    defaultClassReplicaCount: 2
    reclaimPolicy: Retain

  # Only schedule Longhorn on workers
  longhornManager:
    tolerations: []
    nodeSelector:
      node-role: worker

  longhornDriver:
    tolerations: []
    nodeSelector:
      node-role: worker

  ingress:
    enabled: true
    host: longhorn.hubtest.caticloud.net
    ingressClassName: nginx
    tls: true
    tlsSecret: longhorn-tls
    annotations:
      cert-manager.io/cluster-issuer: ca-issuer

  # Namespace label required for pod security in Talos
  namespaceOverride: ""
  managedNamespaceMetadata:
    labels:
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/enforce-version: latest
