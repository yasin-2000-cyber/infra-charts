grafana:
  # RWO PVC requires Recreate to avoid Multi-Attach deadlock during rolling updates
  deploymentStrategy:
    type: Recreate

  # ── Persistence ───────────────────────────────────────────────────────────
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: longhorn
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # ── Azure AD SSO credentials injected from Vault via ExternalSecret ───────
  # ExternalSecret creates the secret 'grafana-azuread-secret' with keys:
  #   AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID
  envFromSecret: grafana-azuread-secret

  # ── Grafana configuration ─────────────────────────────────────────────────
  grafana.ini:
    server:
      domain: grafana.hubtest.caticloud.net
      root_url: https://grafana.hubtest.caticloud.net
      serve_from_sub_path: false

    analytics:
      reporting_enabled: false
      check_for_updates: false

    # Allow both password login (for the initial admin) and SSO
    auth:
      disable_login_form: false
      oauth_auto_login: false

    # Microsoft Azure AD SSO
    # Credentials come from the envFromSecret above
    auth.azuread:
      name: Microsoft
      enabled: true
      allow_sign_up: true
      auto_login: false
      client_id: ${AZURE_CLIENT_ID}
      client_secret: ${AZURE_CLIENT_SECRET}
      scopes: openid email profile
      auth_url: https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize
      token_url: https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
      # Leave empty to allow all Azure AD users (restrict via RBAC below)
      allowed_domains: ""
      # Gate: both groups can log in (comma-separated OIDs).
      # monitoring-test-admin  OID: db8cbdd8-0a52-4409-94b5-4a79890c67fd
      # monitoring-test-viewer OID: cd02937c-1974-4832-83ca-2cf035ac6c46
      allowed_groups: "db8cbdd8-0a52-4409-94b5-4a79890c67fd,cd02937c-1974-4832-83ca-2cf035ac6c46"
      # Grafana 12: use org_mapping for group→role assignment (replaces role_attribute_path for AzureAD).
      # Format: <group-OID>:<org-id>:<role>  (space-separated, org-id 1 = default org)
      # Azure AD group structure:
      #   monitoring-test-admin   ← Grafana Admin (edit dashboards, manage alerts)
      #   monitoring-test-viewer  ← Grafana Viewer (read-only, cannot see Platform Admin folder)
      #
      # Requires App Registration manifest: "groupMembershipClaims": "SecurityGroup"
      org_mapping: "db8cbdd8-0a52-4409-94b5-4a79890c67fd:1:Admin cd02937c-1974-4832-83ca-2cf035ac6c46:1:Viewer"
      role_attribute_path: ""
      role_attribute_strict: false
      allow_assign_grafana_admin: true
      skip_org_role_sync: false

    # Admin credentials come from the 'grafana-admin-secret' K8s Secret
    # (created manually — never stored in git). See bootstrap step 5b.
    security:
      admin_user: admin

    users:
      auto_assign_org: true
      auto_assign_org_id: 1
      auto_assign_org_role: Viewer

    # Enable unified alerting (Grafana-managed alerts)
    unified_alerting:
      enabled: true

    # Dashboard sidecar
    dashboards:
      versions_to_keep: 20

  # Admin password loaded from a manually-created K8s Secret — NOT stored in git.
  # Create before ArgoCD syncs grafana (wave 9):
  #   kubectl create secret generic grafana-admin-secret -n monitoring \
  #     --from-literal=admin-user=admin \
  #     --from-literal=admin-password=<your-strong-password>
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  # ── Pre-configured datasources ────────────────────────────────────────────
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:

        # Mimir — multi-tenant metrics (hub + spoke tenants, pipe-separated)
        - name: Mimir
          type: prometheus
          uid: mimir
          url: http://mimir-nginx.monitoring.svc.cluster.local:80/prometheus
          isDefault: true
          jsonData:
            httpMethod: POST
            httpHeaderName1: "X-Scope-OrgID"
          secureJsonData:
            httpHeaderValue1: "hub|spine-test"

        # Loki — multi-tenant logs (hub + spoke tenants, pipe-separated)
        - name: Loki
          type: loki
          uid: loki
          url: http://loki-gateway.monitoring.svc.cluster.local:80
          jsonData:
            httpHeaderName1: "X-Scope-OrgID"
            # Link Loki trace_id field → Tempo
            derivedFields:
              - datasourceUid: tempo
                matcherRegex: '"trace_id":\s*"([a-f0-9]+)"'
                name: TraceID
                url: "$${__value.raw}"
                urlDisplayLabel: "View Trace in Tempo"
          secureJsonData:
            httpHeaderValue1: "hub|spine-test"

        # Tempo — multi-tenant traces (hub + spoke tenants, pipe-separated)
        - name: Tempo
          type: tempo
          uid: tempo
          url: http://tempo.monitoring.svc.cluster.local:3200
          jsonData:
            httpHeaderName1: "X-Scope-OrgID"
            tracesToLogsV2:
              datasourceUid: loki
              filterByTraceID: true
              filterBySpanID: false
              customQuery: false
              # Fetch logs ±1 minute around the trace span time
              spanStartTimeShift: "-1m"
              spanEndTimeShift: "1m"
              # Map OTel resource attributes (injected by OTel Operator) to Loki labels
              tags:
                - key: k8s.namespace.name
                  value: namespace
                - key: k8s.pod.name
                  value: pod
                - key: service.name
                  value: app
            serviceMap:
              datasourceUid: mimir
            nodeGraph:
              enabled: true
          secureJsonData:
            httpHeaderValue1: "hub|spine-test"

        # AlertManager — view/silence alerts + delivery backend for Grafana-managed alerts
        - name: Alertmanager
          type: alertmanager
          uid: alertmanager
          url: http://alertmanager-monitoring.monitoring.svc.cluster.local:9093
          jsonData:
            implementation: prometheus
            handleGrafanaManagedAlerts: true

  # ── Dashboard sidecar — auto-loads ConfigMaps labeled grafana_dashboard=1 ──
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /var/lib/grafana/dashboards/hub
      searchNamespace: ALL
      # Reads the 'grafana_folder' annotation on each ConfigMap to place the
      # dashboard in the correct Grafana UI folder.
      folderAnnotation: grafana_folder
      provider:
        allowUiUpdates: true
    datasources:
      enabled: false   # We provision datasources via values above

  # ── Alert Rules (provisioned as-code) ────────────────────────────────────
  # Each sub-key becomes a file in /etc/grafana/provisioning/alerting/ inside the pod.
  # Rules are evaluated by Grafana's unified alerting engine against Mimir every 1 minute.
  # Alerts are forwarded to the in-cluster Alertmanager (handleGrafanaManagedAlerts: true).
  alerting:
    contactpoints.yaml:
      apiVersion: 1
      contactPoints:
        - orgId: 1
          name: alertmanager
          receivers:
            - uid: alertmanager-receiver
              type: prometheus-alertmanager
              settings:
                url: http://alertmanager-monitoring.monitoring.svc.cluster.local:9093
                basicAuthUser: ""
              disableResolveMessage: false

    policies.yaml:
      apiVersion: 1
      policies:
        - orgId: 1
          receiver: alertmanager
          group_by: ["alertname", "cluster", "namespace"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          routes:
            - receiver: alertmanager
              object_matchers:
                - ["severity", "=", "critical"]
              repeat_interval: 2h

    rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: InfrastructureAlerts
          folder: Infrastructure Alerts
          interval: 1m
          rules:

            # ── Node alerts ──────────────────────────────────────────────
            - uid: infra-node-down
              title: NodeDown
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'up{job="node-exporter"}'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [0.5]
                          type: lt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: 'Node {{ "{{" }} $labels.instance {{ "}}" }} is down'
                description: 'Node exporter on {{ "{{" }} $labels.instance {{ "}}" }} has been unreachable for more than 2 minutes.'
              isPaused: false

            - uid: infra-node-not-ready
              title: NodeNotReady
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'kube_node_status_condition{condition="Ready",status="true"}'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [0.5]
                          type: lt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: 'Node {{ "{{" }} $labels.node {{ "}}" }} is NotReady'
                description: 'Kubernetes node {{ "{{" }} $labels.node {{ "}}" }} has been in NotReady state for more than 2 minutes.'
              isPaused: false

            # ── Pod alerts ───────────────────────────────────────────────
            - uid: infra-pod-crash-looping
              title: PodCrashLooping
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'rate(kube_pod_container_status_restarts_total[5m])'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [0]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: 'Pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} is crash-looping'
                description: 'Container {{ "{{" }} $labels.container {{ "}}" }} in pod {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} is restarting continuously.'
              isPaused: false

            # ── CPU alerts ───────────────────────────────────────────────
            - uid: infra-high-cpu-warning
              title: HighCPU
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 900
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: '(1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [80]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 10m
              labels:
                severity: warning
              annotations:
                summary: 'High CPU usage on {{ "{{" }} $labels.instance {{ "}}" }}'
                description: 'CPU usage on {{ "{{" }} $labels.instance {{ "}}" }} has been above 80% for more than 10 minutes.'
              isPaused: false

            - uid: infra-high-cpu-critical
              title: HighCPUCritical
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: '(1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [90]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: 'Critical CPU usage on {{ "{{" }} $labels.instance {{ "}}" }}'
                description: 'CPU usage on {{ "{{" }} $labels.instance {{ "}}" }} has been above 90% for more than 5 minutes.'
              isPaused: false

            # ── Memory alerts ────────────────────────────────────────────
            - uid: infra-high-memory
              title: HighMemory
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: '(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [85]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: 'High memory usage on {{ "{{" }} $labels.instance {{ "}}" }}'
                description: 'Memory usage on {{ "{{" }} $labels.instance {{ "}}" }} has been above 85% for more than 5 minutes.'
              isPaused: false

            # ── PVC alerts ───────────────────────────────────────────────
            - uid: infra-pvc-nearly-full
              title: PVCNearlyFull
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [80]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: 'PVC {{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} is nearly full'
                description: 'PVC {{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }} is more than 80% full.'
              isPaused: false

            - uid: infra-pvc-full
              title: PVCFull
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes * 100'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [95]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: 'PVC {{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} is critically full'
                description: 'PVC {{ "{{" }} $labels.persistentvolumeclaim {{ "}}" }} in namespace {{ "{{" }} $labels.namespace {{ "}}" }} is more than 95% full.'
              isPaused: false

            # ── Error rate alerts ────────────────────────────────────────
            - uid: infra-high-error-rate
              title: HighErrorRate
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'sum(rate(nginx_ingress_controller_requests{status=~"5.."}[5m])) / sum(rate(nginx_ingress_controller_requests[5m])) * 100'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [1]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 5m
              labels:
                severity: warning
              annotations:
                summary: 'High HTTP error rate on ingress'
                description: 'Ingress HTTP 5xx error rate has been above 1% for more than 5 minutes.'
              isPaused: false

            - uid: infra-high-error-rate-critical
              title: HighErrorRateCritical
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'sum(rate(nginx_ingress_controller_requests{status=~"5.."}[5m])) / sum(rate(nginx_ingress_controller_requests[5m])) * 100'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [5]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 2m
              labels:
                severity: critical
              annotations:
                summary: 'Critical HTTP error rate on ingress'
                description: 'Ingress HTTP 5xx error rate has been above 5% for more than 2 minutes.'
              isPaused: false

            # ── Image pull errors ────────────────────────────────────────
            - uid: infra-image-pull-error
              title: ImagePullError
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'sum by(namespace, pod, container)(kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"})'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [0]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: 'Image pull error: {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }}'
                description: 'Container {{ "{{" }} $labels.container {{ "}}" }} in {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} cannot pull its image (ImagePullBackOff or ErrImagePull).'
              isPaused: false

            # ── OOM killed ───────────────────────────────────────────────
            - uid: infra-oom-killed
              title: OOMKilled
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 300
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'sum by(namespace, pod, container)(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"})'
                    instant: true
                    intervalMs: 1000
                    maxDataPoints: 43200
                    refId: A
                - refId: B
                  relativeTimeRange:
                    from: 0
                    to: 0
                  datasourceUid: __expr__
                  model:
                    conditions:
                      - evaluator:
                          params: [0]
                          type: gt
                        operator:
                          type: and
                        query:
                          params: [A]
                        reducer:
                          type: last
                        type: query
                    datasource:
                      type: __expr__
                      uid: __expr__
                    expression: A
                    refId: B
                    type: classic_conditions
              noDataState: OK
              execErrState: Error
              for: 0s
              labels:
                severity: critical
              annotations:
                summary: 'OOM killed: {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }}'
                description: 'Container {{ "{{" }} $labels.container {{ "}}" }} in {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }} was terminated due to OOM (out of memory).'
              isPaused: false

            # ── Critical container errors ────────────────────────────────
            - uid: infra-container-critical-error
              title: ContainerCriticalError
              condition: B
              data:
                - refId: A
                  relativeTimeRange:
                    from: 600
                    to: 0
                  datasourceUid: mimir
                  model:
                    datasource:
                      type: prometheus
                      uid: mimir
                    expr: 'sum by(namespace, pod, container)(kube_pod_container_status_waiting_reason{reason=~"RunContainerError|CreateContainerConfigError|CreateContainerError|InvalidImageName"})'
                    instant: true
