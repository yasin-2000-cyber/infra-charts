apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node-metrics
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "AAU Monitoring"
data:
  node-metrics.json: |
    {
      "title": "Node Metrics",
      "uid": "node-metrics",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "tags": ["node", "infrastructure", "cluster"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "templating": {
        "list": [
          {
            "name": "cluster",
            "label": "Cluster",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(up, cluster)", "refId": "StandardVariableQuery" },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {}
          },
          {
            "name": "instance",
            "label": "Node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(up{cluster=~\"$cluster\",job=\"node-exporter\"}, instance)", "refId": "StandardVariableQuery" },
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage %",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "(1 - avg by(instance)(rate(node_cpu_seconds_total{cluster=~\"$cluster\",instance=~\"$instance\",mode=\"idle\"}[5m]))) * 100",
              "legendFormat": "{{ "{{" }} instance {{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }]
              }
            }
          },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 2,
          "title": "Memory Usage %",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "(1 - node_memory_MemAvailable_bytes{cluster=~\"$cluster\",instance=~\"$instance\"} / node_memory_MemTotal_bytes{cluster=~\"$cluster\",instance=~\"$instance\"}) * 100",
              "legendFormat": "{{ "{{" }} instance {{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 75 }, { "color": "red", "value": 90 }]
              }
            }
          },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 3,
          "title": "Memory — Used vs Total",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "node_memory_MemTotal_bytes{cluster=~\"$cluster\",instance=~\"$instance\"} - node_memory_MemAvailable_bytes{cluster=~\"$cluster\",instance=~\"$instance\"}",
              "legendFormat": "Used — {{ "{{" }} instance {{ "}}" }}"
            },
            {
              "refId": "B",
              "expr": "node_memory_MemTotal_bytes{cluster=~\"$cluster\",instance=~\"$instance\"}",
              "legendFormat": "Total — {{ "{{" }} instance {{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 4,
          "title": "Root Disk Usage %",
          "type": "gauge",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "(node_filesystem_size_bytes{cluster=~\"$cluster\",instance=~\"$instance\",mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} - node_filesystem_free_bytes{cluster=~\"$cluster\",instance=~\"$instance\",mountpoint=\"/\",fstype!~\"tmpfs|overlay\"}) / node_filesystem_size_bytes{cluster=~\"$cluster\",instance=~\"$instance\",mountpoint=\"/\",fstype!~\"tmpfs|overlay\"} * 100",
              "legendFormat": "{{ "{{" }} instance {{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 85 }]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true }
        },
        {
          "id": 5,
          "title": "System Load (1m / 5m / 15m)",
          "type": "timeseries",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            { "refId": "A", "expr": "node_load1{cluster=~\"$cluster\",instance=~\"$instance\"}", "legendFormat": "1m — {{ "{{" }} instance {{ "}}" }}" },
            { "refId": "B", "expr": "node_load5{cluster=~\"$cluster\",instance=~\"$instance\"}", "legendFormat": "5m — {{ "{{" }} instance {{ "}}" }}" },
            { "refId": "C", "expr": "node_load15{cluster=~\"$cluster\",instance=~\"$instance\"}", "legendFormat": "15m — {{ "{{" }} instance {{ "}}" }}" }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 6,
          "title": "Disk I/O",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(node_disk_read_bytes_total{cluster=~\"$cluster\",instance=~\"$instance\"}[5m])",
              "legendFormat": "Read — {{ "{{" }} instance {{ "}}" }} {{ "{{" }} device {{ "}}" }}"
            },
            {
              "refId": "B",
              "expr": "rate(node_disk_written_bytes_total{cluster=~\"$cluster\",instance=~\"$instance\"}[5m])",
              "legendFormat": "Write — {{ "{{" }} instance {{ "}}" }} {{ "{{" }} device {{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 7,
          "title": "Network I/O",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(node_network_receive_bytes_total{cluster=~\"$cluster\",instance=~\"$instance\",device!~\"lo|veth.*|docker.*|flannel.*|cali.*|cbr.*\"}[5m])",
              "legendFormat": "RX — {{ "{{" }} instance {{ "}}" }} {{ "{{" }} device {{ "}}" }}"
            },
            {
              "refId": "B",
              "expr": "rate(node_network_transmit_bytes_total{cluster=~\"$cluster\",instance=~\"$instance\",device!~\"lo|veth.*|docker.*|flannel.*|cali.*|cbr.*\"}[5m])",
              "legendFormat": "TX — {{ "{{" }} instance {{ "}}" }} {{ "{{" }} device {{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } },
          "options": { "tooltip": { "mode": "multi" } }
        }
      ]
    }
