# Pulls Azure AD app registration credentials from Vault.
# Vault path: secret/hub/prod/grafana-azuread
# Required keys:  AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID
#
# Create in Vault after initialization:
#   vault kv put secret/hub/prod/grafana-azuread \
#     AZURE_CLIENT_ID="<app-registration-client-id>" \
#     AZURE_CLIENT_SECRET="<app-registration-client-secret>" \
#     AZURE_TENANT_ID="<azure-tenant-id>"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-azuread-secret
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-azuread-secret
    creationPolicy: Owner
  data:
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: hub/prod/grafana-azuread
        property: AZURE_CLIENT_ID
    - secretKey: AZURE_CLIENT_SECRET
      remoteRef:
        key: hub/prod/grafana-azuread
        property: AZURE_CLIENT_SECRET
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: hub/prod/grafana-azuread
        property: AZURE_TENANT_ID
