apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k8s-workloads
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "AAU Monitoring"
data:
  k8s-workloads.json: |
    {
      "title": "K8s Workloads",
      "uid": "k8s-workloads",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "tags": ["kubernetes", "workloads", "cluster"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "templating": {
        "list": [
          {
            "name": "cluster",
            "label": "Cluster",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(kube_pod_info, cluster)", "refId": "StandardVariableQuery" },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {}
          },
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(kube_pod_info{cluster=~\"$cluster\"}, namespace)", "refId": "StandardVariableQuery" },
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Deployments Available",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_deployment_status_replicas_available{cluster=~\"$cluster\",namespace=~\"$namespace\"} >= kube_deployment_spec_replicas{cluster=~\"$cluster\",namespace=~\"$namespace\"}) or vector(0)",
              "legendFormat": "Available"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }
        },
        {
          "id": 2,
          "title": "Deployments Degraded",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_deployment_status_replicas_available{cluster=~\"$cluster\",namespace=~\"$namespace\"} < kube_deployment_spec_replicas{cluster=~\"$cluster\",namespace=~\"$namespace\"}) or vector(0)",
              "legendFormat": "Degraded"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }
        },
        {
          "id": 3,
          "title": "DaemonSets Ready",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_daemonset_status_number_ready{cluster=~\"$cluster\",namespace=~\"$namespace\"}) or vector(0)",
              "legendFormat": "Ready"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }
        },
        {
          "id": 4,
          "title": "Total Pods",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_pod_info{cluster=~\"$cluster\",namespace=~\"$namespace\"}) or vector(0)",
              "legendFormat": "Pods"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" }
        },
        {
          "id": 5,
          "title": "Pods by Phase",
          "type": "piechart",
          "gridPos": { "x": 0, "y": 4, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "count by(phase)(kube_pod_status_phase{cluster=~\"$cluster\",namespace=~\"$namespace\"})",
              "legendFormat": "{{ "{{" }} phase {{ "}}" }}"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "legend": { "displayMode": "table", "placement": "right" } }
        },
        {
          "id": 6,
          "title": "Container Restart Rate (top 10)",
          "type": "timeseries",
          "gridPos": { "x": 8, "y": 4, "w": 16, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, rate(kube_pod_container_status_restarts_total{cluster=~\"$cluster\",namespace=~\"$namespace\"}[5m]) > 0)",
              "legendFormat": "{{ "{{" }} namespace {{ "}}" }}/{{ "{{" }} pod {{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 7,
          "title": "Pod Status Table",
          "type": "table",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 10 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_pod_status_phase{cluster=~\"$cluster\",namespace=~\"$namespace\"}",
              "legendFormat": "{{ "{{" }} namespace {{ "}}" }}/{{ "{{" }} pod {{ "}}" }} — {{ "{{" }} phase {{ "}}" }}",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "__name__": true, "job": true, "instance": true, "uid": true },
                "renameByName": { "cluster": "Cluster", "namespace": "Namespace", "pod": "Pod", "phase": "Phase", "Value": "Active" }
              }
            },
            { "id": "filterByValue", "options": { "filters": [{ "fieldName": "Active", "config": { "id": "greaterOrEqual", "options": { "value": 1 } } }], "match": "all", "type": "include" } }
          ],
          "fieldConfig": { "defaults": { "custom": { "filterable": true } } },
          "options": { "sortBy": [{ "displayName": "Namespace", "desc": false }] }
        },
        {
          "id": 8,
          "title": "PVC Disk Usage %",
          "type": "gauge",
          "gridPos": { "x": 0, "y": 22, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "kubelet_volume_stats_used_bytes{cluster=~\"$cluster\",namespace=~\"$namespace\"} / kubelet_volume_stats_capacity_bytes{cluster=~\"$cluster\",namespace=~\"$namespace\"} * 100",
              "legendFormat": "{{ "{{" }} namespace {{ "}}" }}/{{ "{{" }} persistentvolumeclaim {{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 85 }]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "orientation": "auto", "showThresholdMarkers": true }
        },
        {
          "id": 9,
          "title": "StatefulSet Ready Replicas",
          "type": "table",
          "gridPos": { "x": 12, "y": 22, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "kube_statefulset_status_replicas_ready{cluster=~\"$cluster\",namespace=~\"$namespace\"}",
              "legendFormat": "{{ "{{" }} statefulset {{ "}}" }}",
              "instant": true
            },
            {
              "refId": "B",
              "expr": "kube_statefulset_replicas{cluster=~\"$cluster\",namespace=~\"$namespace\"}",
              "legendFormat": "{{ "{{" }} statefulset {{ "}}" }}",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "__name__": true, "job": true, "instance": true },
                "renameByName": { "cluster": "Cluster", "namespace": "Namespace", "statefulset": "StatefulSet" }
              }
            }
          ],
          "fieldConfig": { "defaults": { "custom": { "filterable": true } } }
        }
      ]
    }
