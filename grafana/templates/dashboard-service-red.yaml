apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-service-red
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  service-red.json: |
    {
      "title": "Service RED Metrics",
      "uid": "service-red",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "tags": ["traces", "tempo", "service", "cluster"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "description": "Request Rate, Error Rate, and Duration per service. Requires Tempo metrics generator (span metrics) enabled.",
      "templating": {
        "list": [
          {
            "name": "cluster",
            "label": "Cluster",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(up, cluster)", "refId": "StandardVariableQuery" },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {}
          },
          {
            "name": "service",
            "label": "Service",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "mimir" },
            "query": { "query": "label_values(traces_service_graph_request_total{cluster=~\"$cluster\"}, client)", "refId": "StandardVariableQuery" },
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".*",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 0,
          "title": "Tempo Metrics Generator Required",
          "type": "text",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 2 },
          "options": {
            "mode": "markdown",
            "content": "Panels below use span metrics written to Mimir by Tempo's metrics generator. If panels show **No data**, enable `metricsGenerator` in the Tempo Helm values."
          }
        },
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 2, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by(client)(rate(traces_service_graph_request_total{cluster=~\"$cluster\",client=~\"$service\"}[5m]))",
              "legendFormat": "{{ "{{" }} client {{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 2,
          "title": "Error Rate (%)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 2, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by(client)(rate(traces_service_graph_request_failed_total{cluster=~\"$cluster\",client=~\"$service\"}[5m])) / sum by(client)(rate(traces_service_graph_request_total{cluster=~\"$cluster\",client=~\"$service\"}[5m])) * 100",
              "legendFormat": "{{ "{{" }} client {{ "}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }]
              }
            }
          },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 3,
          "title": "P50 Latency (ms)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 10, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.50, sum by(client, le)(rate(traces_service_graph_request_duration_seconds_bucket{cluster=~\"$cluster\",client=~\"$service\"}[5m]))) * 1000",
              "legendFormat": "p50 — {{ "{{" }} client {{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 4,
          "title": "P99 Latency (ms)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 10, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.99, sum by(client, le)(rate(traces_service_graph_request_duration_seconds_bucket{cluster=~\"$cluster\",client=~\"$service\"}[5m]))) * 1000",
              "legendFormat": "p99 — {{ "{{" }} client {{ "}}" }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 5,
          "title": "Top Services by Request Rate",
          "type": "table",
          "gridPos": { "x": 0, "y": 18, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "mimir" },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(20, sum by(client)(rate(traces_service_graph_request_total{cluster=~\"$cluster\"}[5m])))",
              "legendFormat": "{{ "{{" }} client {{ "}}" }}",
              "instant": true
            },
            {
              "refId": "B",
              "expr": "topk(20, sum by(client)(rate(traces_service_graph_request_failed_total{cluster=~\"$cluster\"}[5m])) / sum by(client)(rate(traces_service_graph_request_total{cluster=~\"$cluster\"}[5m])) * 100)",
              "legendFormat": "{{ "{{" }} client {{ "}}" }}",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "renameByName": { "client": "Service", "Value #A": "Req/s", "Value #B": "Error %" }
              }
            }
          ],
          "fieldConfig": {
            "defaults": { "custom": { "filterable": true } },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Error %" }, "properties": [{ "id": "unit", "value": "percent" }, { "id": "thresholds", "value": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } }, { "id": "custom.displayMode", "value": "color-background" }] },
              { "matcher": { "id": "byName", "options": "Req/s" }, "properties": [{ "id": "unit", "value": "reqps" }] }
            ]
          },
          "options": { "sortBy": [{ "displayName": "Req/s", "desc": true }] }
        }
      ]
    }
