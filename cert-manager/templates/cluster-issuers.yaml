# ClusterIssuers — three tiers:
#   1. selfsigned  : bootstrap issuer (issues the internal CA cert)
#   2. ca-issuer   : internal CA (signs all in-cluster Ingress certs)
#   3. letsencrypt-prod : public ACME (for any public-facing endpoints)
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
# Internal root CA — 10-year lifetime, signed by the selfsigned issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: selfsigned-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: hub-internal-ca
  secretName: selfsigned-ca-secret
  duration: 87600h   # 10 years
  renewBefore: 720h  # renew 30 days before expiry
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ca-issuer
spec:
  ca:
    secretName: selfsigned-ca-secret
---
# Let's Encrypt — for public endpoints on caticloud.net
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: yasin.ib@aau.iq
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
