apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hub
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Hub cluster — unified observability platform

  sourceRepos:
    - https://github.com/yasin-2000-cyber/infra-charts.git
    - https://argoproj.github.io/argo-helm
    - oci://ghcr.io/metallb
    - oci://ghcr.io/ingress-nginx
    - oci://ghcr.io/cert-manager
    - https://charts.longhorn.io
    - oci://registry.hashicorp.com/hashicorp
    - https://charts.external-secrets.io
    - https://grafana.github.io/helm-charts
    - https://prometheus-community.github.io/helm-charts
    - https://helm.releases.hashicorp.com
    - https://kubernetes-sigs.github.io/metrics-server/
    - https://charts.jetstack.io

  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: metallb-system
    - server: https://kubernetes.default.svc
      namespace: ingress-nginx
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: longhorn-system
    - server: https://kubernetes.default.svc
      namespace: vault
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: kube-system

  clusterResourceWhitelist:
    - group: "*"
      kind: "*"

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  roles:
    - name: devops
      description: Full access to hub infrastructure
      policies:
        - p, proj:hub:devops, applications, *, hub/*, allow
      groups:
        - devops
