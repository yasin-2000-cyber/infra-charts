# MetalLB Layer 2 IP pool — hub cluster node network: 100.64.5.0/24
# Nodes: master 100.64.5.51, worker1 100.64.5.52, worker2 100.64.5.53
# Pool:  100.64.5.70-100.64.5.79 (10 IPs for LoadBalancer services)
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: hub-pool
  namespace: metallb-system
spec:
  addresses:
    - 100.64.5.70-100.64.5.79
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: hub-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - hub-pool
