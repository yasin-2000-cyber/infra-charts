alloy:
  # Run as DaemonSet — one Alloy pod per node
  controller:
    type: daemonset
    tolerations:
      - operator: Exists

  alloy:
    securityContext:
      privileged: true
      runAsUser: 0

    configMap:
      create: true
      content: |
        // ── LOGS: stream pod logs via K8s API → Loki hub ─────────────────────────
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pod_logs" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
        }

        loki.source.kubernetes "pods" {
          targets    = discovery.relabel.pod_logs.output
          forward_to = [loki.write.hub.receiver]
        }

        loki.write "hub" {
          endpoint {
            url = "https://loki.hubtest.caticloud.net/loki/api/v1/push"
            headers = {
              "X-Scope-OrgID" = "spine-test",
            }
            tls_config {
              insecure_skip_verify = true
            }
          }
          external_labels = {
            cluster    = "spine-test",
            datacenter = "AAU",
          }
        }

        // ── METRICS: pod scraping → Mimir hub ────────────────────────────────────
        discovery.kubernetes "metrics_pods" {
          role = "pod"
        }

        discovery.relabel "scrape_pods" {
          targets = discovery.kubernetes.metrics_pods.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
            action        = "keep"
            regex         = "true"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
            target_label  = "__metrics_path__"
            regex         = "(.+)"
          }
          rule {
            source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
            action        = "replace"
            regex         = "([^:]+)(?::\\d+)?;(\\d+)"
            replacement   = "$1:$2"
            target_label  = "__address__"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
        }

        prometheus.scrape "pods" {
          targets    = discovery.relabel.scrape_pods.output
          forward_to = [prometheus.remote_write.hub.receiver]
        }

        prometheus.remote_write "hub" {
          endpoint {
            url = "https://mimir.hubtest.caticloud.net/api/v1/push"
            headers = {
              "X-Scope-OrgID" = "spine-test",
            }
            tls_config {
              insecure_skip_verify = true
            }
          }
          external_labels = {
            cluster    = "spine-test",
            datacenter = "AAU",
          }
        }

        // ── TRACES: OTLP receiver → Tempo hub ────────────────────────────────────
        otelcol.receiver.otlp "default" {
          grpc {
            endpoint = "0.0.0.0:4317"
          }
          http {
            endpoint = "0.0.0.0:4318"
          }
          output {
            traces = [otelcol.exporter.otlp.hub.input]
          }
        }

        otelcol.exporter.otlp "hub" {
          client {
            endpoint = "tempo.hubtest.caticloud.net:4317"
            headers = {
              "X-Scope-OrgID" = "spine-test",
            }
            tls {
              insecure_skip_verify = true
            }
          }
        }

  serviceAccount:
    create: true

  rbac:
    create: true

  # Expose OTLP ports so instrumented pods can reach Alloy on the node
  service:
    enabled: true
    portName: otlp-grpc
