opentelemetry-operator:
  # cert-manager handles the webhook TLS certificates
  admissionWebhooks:
    certManager:
      enabled: true

  manager:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # Default Instrumentation CR — auto-inject into namespaces with annotation
  # instrumentation.opentelemetry.io/inject-<language>: "true"
  # OTLP endpoint points to Alloy running on the same node (DaemonSet)
  instrumentationSpec:
    exporter:
      endpoint: http://$(ALLOY_HOST_IP):4317
    propagators:
      - tracecontext
      - baggage
      - b3
    sampler:
      type: parentbased_traceidratio
      argument: "1.0"
