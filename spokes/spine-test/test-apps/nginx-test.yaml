---
apiVersion: v1
kind: Namespace
metadata:
  name: test-apps
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: test-apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-test
  namespace: test-apps
spec:
  selector:
    app: nginx-test
  ports:
    - port: 80
      targetPort: 80
