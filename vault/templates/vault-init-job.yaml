# PostSync hook — runs after Vault is deployed and ready.
# Enables KV v2 secret engine and configures Kubernetes auth for ESO.
# Idempotent: safe to re-run (uses || true for already-enabled operations).
#
# IMPORTANT: Before this job runs, create the vault-init-token secret manually.
# This secret is NOT stored in git (public repo — zero secrets in git).
#
# Step 1 — Initialize and unseal Vault:
#   kubectl exec -n vault vault-0 -- vault operator init \
#     -key-shares=5 -key-threshold=3 -format=json > vault-init.json
#   kubectl exec -n vault vault-0 -- vault operator unseal <KEY_1>
#   kubectl exec -n vault vault-0 -- vault operator unseal <KEY_2>
#   kubectl exec -n vault vault-0 -- vault operator unseal <KEY_3>
#
# Step 2 — Create the token secret (kubectl, not git):
#   kubectl create secret generic vault-init-token -n vault \
#     --from-literal=token=<ROOT_TOKEN_FROM_vault-init.json>
#
# Step 3 — Force-sync the vault ArgoCD app so this PostSync job runs.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault
      containers:
        - name: vault-init
          image: hashicorp/vault:1.17.2
          env:
            - name: VAULT_ADDR
              value: http://vault.vault.svc.cluster.local:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-init-token
                  key: token
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "==> Enabling KV v2 secret engine..."
              vault secrets enable -path=secret kv-v2 || true

              echo "==> Enabling Kubernetes auth method..."
              vault auth enable kubernetes || true

              echo "==> Configuring Kubernetes auth..."
              vault write auth/kubernetes/config \
                kubernetes_host="https://${KUBERNETES_PORT_443_TCP_ADDR}:443"

              echo "==> Creating ESO policy..."
              vault policy write external-secrets - <<EOF
              path "secret/data/*" {
                capabilities = ["read", "list"]
              }
              path "secret/metadata/*" {
                capabilities = ["read", "list"]
              }
              EOF

              echo "==> Creating ESO Kubernetes auth role..."
              vault write auth/kubernetes/role/external-secrets \
                bound_service_account_names=external-secrets \
                bound_service_account_namespaces=external-secrets \
                policies=external-secrets \
                ttl=1h

              echo "==> Vault initialization complete."
