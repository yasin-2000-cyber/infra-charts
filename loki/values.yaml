loki:
  # ── Loki server config (nested under loki.loki in sub-chart) ─────────────
  loki:
    auth_enabled: true    # multi-tenancy via X-Scope-OrgID header

    querier:
      multi_tenant_queries_enabled: true

    commonConfig:
      replication_factor: 1   # single binary — no ring replication

    # Schema — TSDB index + filesystem object store
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    # All storage on local filesystem (Longhorn PVC) — no S3 for test cluster
    storage:
      type: filesystem
      bucketNames:
        chunks: chunks
        ruler: ruler
        admin: admin

    # Ruler (for LogQL alerting rules)
    rulerConfig:
      storage:
        type: local
        local:
          directory: /rules
      rule_path: /rules
      alertmanager_url: http://alertmanager-monitoring.monitoring.svc.cluster.local:9093
      enable_api: true

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_cache_freshness_per_query: 10m
      retention_period: 744h   # 31 days

  # ── Deployment mode ───────────────────────────────────────────────────────
  deploymentMode: SingleBinary

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
      storageClass: longhorn
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

  # Disable distributed components
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  # ── Disable caches (memcached) — not needed at test scale ─────────────────
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

  # ── Gateway (NGINX proxy) — single ingress point for log push + query ─────
  gateway:
    enabled: true
    ingress:
      enabled: true
      ingressClassName: nginx
      hosts:
        - host: loki.hubtest.caticloud.net
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: loki-tls
          hosts:
            - loki.hubtest.caticloud.net
      annotations:
        cert-manager.io/cluster-issuer: ca-issuer
        # Large log payloads from spokes
        nginx.ingress.kubernetes.io/proxy-body-size: "32m"
